name: Weekly Iran-US-Israel Conflict Report

on:
  schedule:
    # Every Sunday at 07:00 UTC
    - cron: "0 7 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate_and_email_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report and send email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_RECIPIENT: ${{ vars.REPORT_RECIPIENT || 'bahoma31@gmail.com' }}
        run: |
          set -euo pipefail
          python scripts/generate_weekly_report.py

      - name: Commit report and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if ! git status --porcelain | grep -q .; then
            echo "No changes to commit."
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          BRANCH="report/weekly-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it already exists (from a previous failed run)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add plans/weekly_report.md
          git commit -m "Add weekly conflict report for ${DATE}"
          git push origin "$BRANCH"

          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            PR_NUMBER="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --title "تقرير أسبوعي: آخر مستجدات الحرب بين إيران وأمريكا وإسرائيل (${DATE})" \
              --body "تقرير أسبوعي آلي مُولَّد بتاريخ ${DATE} يغطي آخر مستجدات الصراع بين إيران وأمريكا وإسرائيل." \
              --base "${DEFAULT_BRANCH:-main}" \
              --head "$BRANCH")
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi

          echo "Merging PR #${PR_NUMBER} …"
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch
          echo "PR merge initiated successfully."
