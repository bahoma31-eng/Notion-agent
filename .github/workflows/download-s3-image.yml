name: Download S3 Image from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  download-image:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # استخراج أول رابط S3 أو amazonaws من وصف الـ Issue
      - name: Extract S3 URL from issue body
        id: extract_url
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          S3_URL=$(printf '%s' "$ISSUE_BODY" | grep -oP 'https?://[^\s"<>]*amazonaws\.com[^\s"<>]*' | head -1 || true)
          if [ -z "$S3_URL" ]; then
            S3_URL=$(printf '%s' "$ISSUE_BODY" | grep -oP 'https?://s3\.[^\s"<>]*' | head -1 || true)
          fi
          echo "s3_url=$S3_URL" >> "$GITHUB_OUTPUT"

      # تحميل الصورة وتحديد الامتداد وحفظها في مجلد uploads/
      - name: Download image and save to uploads/
        id: download
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          S3_URL: ${{ steps.extract_url.outputs.s3_url }}
        run: |
          set -euo pipefail

          if [ -z "$S3_URL" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
              -d "{\"body\":\"❌ لم يتم العثور على رابط S3 صالح في وصف الـ Issue. يرجى إدراج رابط يحتوي على \\`amazonaws.com\\` في وصف الـ Issue.\"}"
            exit 1
          fi

          # تحديد الامتداد من الرابط (بدون query string)
          URL_PATH=$(printf '%s' "$S3_URL" | sed 's/?.*//')
          EXT=$(printf '%s' "$URL_PATH" | grep -oP '\.(jpg|jpeg|png|gif|webp|bmp|svg|tiff?)$' | sed 's/\.//' | sed 's/^tif$/tiff/' || true)

          # تحميل الصورة وحفظ الـ headers في نفس الطلب
          TEMP_FILE="/tmp/s3_image_${ISSUE_NUMBER}"
          TEMP_HEADERS="/tmp/s3_headers_${ISSUE_NUMBER}"
          HTTP_CODE=$(curl -sL -w "%{http_code}" -D "$TEMP_HEADERS" -o "$TEMP_FILE" "$S3_URL")

          if [ "$HTTP_CODE" != "200" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
              -d "{\"body\":\"❌ فشل تحميل الصورة من الرابط. رمز الاستجابة HTTP: \\`$HTTP_CODE\\`\"}"
            exit 1
          fi

          # إذا لم يُحدَّد الامتداد من الرابط، استخرجه من Content-Type header المحفوظ
          if [ -z "$EXT" ]; then
            CONTENT_TYPE=$(grep -i '^content-type:' "$TEMP_HEADERS" | grep -oP '(?<=image/)[a-zA-Z0-9+]+' | head -1 || true)
            case "$CONTENT_TYPE" in
              jpeg|jpg)  EXT="jpg" ;;
              png)       EXT="png" ;;
              gif)       EXT="gif" ;;
              webp)      EXT="webp" ;;
              svg+xml)   EXT="svg" ;;
              bmp)       EXT="bmp" ;;
              tiff)      EXT="tiff" ;;
              *)         EXT="jpg" ;;
            esac
          fi

          mkdir -p uploads
          DEST="uploads/issue-${ISSUE_NUMBER}.${EXT}"
          cp "$TEMP_FILE" "$DEST"
          echo "filename=$DEST" >> "$GITHUB_OUTPUT"

      # إنشاء branch وفتح PR عبر GitHub REST API وتفعيل auto-merge
      - name: Commit and open PR
        if: steps.download.conclusion == 'success'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FILENAME: ${{ steps.download.outputs.filename }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="uploads/issue-${ISSUE_NUMBER}"

          # حذف البرانش القديم إن وجد
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add "$FILENAME"
          git commit -m "feat: Add S3 image for issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          # إنشاء PR عبر GitHub REST API مباشرةً بدون gh CLI
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls" \
            -d "{
              \"title\": \"feat: تحميل صورة S3 للـ Issue #${ISSUE_NUMBER}\",
              \"body\": \"Closes #${ISSUE_NUMBER}\",
              \"head\": \"$BRANCH\",
              \"base\": \"${DEFAULT_BRANCH:-main}\",
              \"draft\": false
            }")

          PR_NUMBER=$(echo "$PR_RESPONSE" | grep -o '"number":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "PR #${PR_NUMBER} created."

          # تفعيل auto-merge
          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/merge" \
            -d "{\"merge_method\": \"squash\"}" || true

          echo "Auto-merge enabled for PR #${PR_NUMBER}."

      # إغلاق الـ Issue بعد نجاح العملية عبر GitHub REST API
      - name: Close issue
        if: steps.download.conclusion == 'success'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FILENAME: ${{ steps.download.outputs.filename }}
          REPO: ${{ github.repository }}
        run: |
          # إضافة تعليق
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            -d "{\"body\": \"✅ تم تحميل الصورة وحفظها في \\`${FILENAME}\\` بنجاح! سيتم دمج الـ commit تلقائياً على \\`main\\`.\"}"

          # إغلاق الـ Issue
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER" \
            -d "{\"state\": \"closed\"}"
