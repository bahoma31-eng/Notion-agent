name: Download S3 Image from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  download-image:
    runs-on: ubuntu-latest
    env:
      REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # استخراج أول رابط صورة من وصف الـ Issue (أي رابط https ينتهي بامتداد صورة)
      - name: Extract image URL from issue body
        id: extract_url
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          # أولاً: ابحث عن روابط amazonaws.com
          IMG_URL=$(printf '%s' "$ISSUE_BODY" | grep -oP 'https?://[^\s"<>]*amazonaws\.com[^\s"<>]*' | head -1 || true)

          # ثانياً: أي رابط ينتهي بامتداد صورة
          if [ -z "$IMG_URL" ]; then
            IMG_URL=$(printf '%s' "$ISSUE_BODY" | grep -oP 'https?://[^\s"<>]*\.(jpg|jpeg|png|gif|webp|bmp|svg|tiff?)([?#][^\s"<>]*)?' | head -1 || true)
          fi

          # ثالثاً: أي رابط https عام في جسم الـ Issue
          if [ -z "$IMG_URL" ]; then
            IMG_URL=$(printf '%s' "$ISSUE_BODY" | grep -oP 'https?://[^\s"<>]+' | head -1 || true)
          fi

          echo "img_url=$IMG_URL" >> "$GITHUB_OUTPUT"

      # تحميل الصورة وتحديد الامتداد وحفظها في مجلد uploads/
      - name: Download image and save to uploads/
        id: download
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          IMG_URL: ${{ steps.extract_url.outputs.img_url }}
        run: |
          set -euo pipefail

          if [ -z "$IMG_URL" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $REPO_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
              -d "{\"body\":\"❌ لم يتم العثور على أي رابط صورة في وصف الـ Issue. يرجى إدراج رابط صورة في جسم الـ Issue.\"}"
            exit 1
          fi

          # تحديد الامتداد من الرابط (بدون query string)
          URL_PATH=$(printf '%s' "$IMG_URL" | sed 's/?.*//')
          EXT=$(printf '%s' "$URL_PATH" | grep -oP '\.(jpg|jpeg|png|gif|webp|bmp|svg|tiff?)$' | sed 's/\.//' | sed 's/^tif$/tiff/' || true)

          # تحميل الصورة وحفظ الـ headers
          TEMP_FILE="/tmp/img_${ISSUE_NUMBER}"
          TEMP_HEADERS="/tmp/img_headers_${ISSUE_NUMBER}"
          HTTP_CODE=$(curl -sL -w "%{http_code}" -D "$TEMP_HEADERS" -o "$TEMP_FILE" "$IMG_URL")

          if [ "$HTTP_CODE" != "200" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $REPO_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
              -d "{\"body\":\"❌ فشل تحميل الصورة. رمز HTTP: \`$HTTP_CODE\`\"}"
            exit 1
          fi

          # إذا لم يُحدَّد الامتداد من الرابط، استخرجه من Content-Type
          if [ -z "$EXT" ]; then
            CONTENT_TYPE=$(grep -i '^content-type:' "$TEMP_HEADERS" | grep -oP '(?<=image/)[a-zA-Z0-9+]+' | head -1 || true)
            case "$CONTENT_TYPE" in
              jpeg|jpg)  EXT="jpg" ;;
              png)       EXT="png" ;;
              gif)       EXT="gif" ;;
              webp)      EXT="webp" ;;
              svg+xml)   EXT="svg" ;;
              bmp)       EXT="bmp" ;;
              tiff)      EXT="tiff" ;;
              *)         EXT="jpg" ;;
            esac
          fi

          mkdir -p uploads
          DEST="uploads/issue-${ISSUE_NUMBER}.${EXT}"
          cp "$TEMP_FILE" "$DEST"
          echo "filename=$DEST" >> "$GITHUB_OUTPUT"

      # إنشاء branch وفتح PR وتفعيل auto-merge
      - name: Commit and open PR
        if: steps.download.conclusion == 'success'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FILENAME: ${{ steps.download.outputs.filename }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="uploads/issue-${ISSUE_NUMBER}"
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add "$FILENAME"
          git commit -m "feat: Add image for issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "feat: تحميل صورة للـ Issue #${ISSUE_NUMBER}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --base "${DEFAULT_BRANCH:-main}" \
            --head "$BRANCH" \
            --no-draft)

          echo "PR created: $PR_URL"
          gh pr merge --squash --auto --delete-branch "$PR_URL"
          echo "Auto-merge enabled for: $PR_URL"

      # تعليق على الـ Issue (الإغلاق يتم تلقائياً عبر Closes #ISSUE_NUMBER بعد الدمج)
      - name: Comment on issue
        if: steps.download.conclusion == 'success'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FILENAME: ${{ steps.download.outputs.filename }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $REPO_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            -d "{\"body\": \"✅ تم تحميل الصورة وحفظها في \`${FILENAME}\` بنجاح! سيتم دمجها تلقائياً على \`main\`.\"}"
