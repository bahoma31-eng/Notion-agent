name: 🍕 Facebook Auto Post — الركن الجميل

on:
  schedule:
    - cron: '0 * * * *'   # كل ساعة
  workflow_dispatch:        # تشغيل يدوي للاختبار

permissions:
  contents: write
  pull-requests: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install openai requests

      - name: تشغيل سكريبت النشر
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python scripts/facebook_poster.py
