name: Auto-create plan_strategy file

on:
  issues:
    types: [opened]

permissions:
  contents: write

concurrency:
  group: plan-strategy-$ github.event.issue.number 
  cancel-in-progress: false

jobs:
  create_plan_file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate plan_strategy file (AI)
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 
          GITHUB_REPOSITORY: $ github.repository 
          ISSUE_NUMBER: $ github.event.issue.number 
          OPENAI_API_KEY: $ secrets.OPENAI_API_KEY 
          OPENAI_MODEL: $ vars.OPENAI_MODEL 
          OPENAI_BASE_URL: $ vars.OPENAI_BASE_URL 
        run: |
          set -euo pipefail
          FILE="plan_strategy_${ISSUE_NUMBER}.md"
          if [ -f "$FILE" ]; then
            echo "File already exists: $FILE"
            exit 0
          fi
          python scripts/generate_plan_strategy.py

      - name: Commit and push
        env:
          ISSUE_NUMBER: $ github.event.issue.number 
        run: |
          set -euo pipefail
          FILE="plan_strategy_${ISSUE_NUMBER}.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            git add "$FILE"
            git commit -m "Add AI plan_strategy for issue #${ISSUE_NUMBER}"
            git push
          else
            echo "No changes to commit."
          fi
