name: 🤖 Auto Post Facebook — الركن الجميل

on:
  schedule:
    - cron: '*/30 * * * *'   # كل 30 دقيقة
  workflow_dispatch:           # تشغيل يدوي للاختبار

permissions:
  contents: write
  pull-requests: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests

      - name: Run publisher script
        env:
          GH_TOKEN: ${{ secrets.MODELS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/facebook_publisher.py

      - name: Commit and push log via PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # انتقل إلى branch جديد للسجل
          BRANCH="logs/post-$(date +'%Y%m%d-%H%M%S')"
          git checkout -b "$BRANCH"

          git add logs/posts_log.csv
          git diff --staged --quiet && echo "لا تغييرات للحفظ" && exit 0

          git commit -m "📝 log: نشر جديد $(date +'%Y-%m-%d %H:%M')"
          git push origin "$BRANCH"

          # فتح PR ودمجه تلقائياً
          gh pr create \
            --title "📝 log: نشر جديد $(date +'%Y-%m-%d %H:%M')" \
            --body "تحديث تلقائي لسجل النشر" \
            --base main \
            --head "$BRANCH"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch
